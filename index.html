// ===================== STATE & HELPERS =====================

let currentPhase = 'all';

let charts = {};

function fmt(n){if(n==null)return'-';return n.toLocaleString('th-TH')}
function fmtM(n){if(n>=1e6)return (n/1e6).toFixed(2)+' ล.';return fmt(n)}
function pct(a,b){return b?((a/b)*100).toFixed(1)+'%':'0%'}
function statusColor(s){return{'ดำเนินการแล้ว':'#10b981','กำลังดำเนินการ':'#3b82f6','วางแผน':'#f59e0b','ยังไม่เริ่ม':'#9ca3af'}[s]||'#9ca3af'}
function statusBg(s){return{'ดำเนินการแล้ว':'bg-green-100 text-green-800','กำลังดำเนินการ':'bg-blue-100 text-blue-800','วางแผน':'bg-yellow-100 text-yellow-800','ยังไม่เริ่ม':'bg-gray-100 text-gray-500'}[s]||'bg-gray-100 text-gray-500'}

function getBudget(){
  if(currentPhase==='phase1') return P1.budget;
  if(currentPhase==='phase2') return P2.budget;
  return {
    grandTotal: P1.budget.grandTotal + P2.budget.grandTotal,
    sss: P1.budget.sss + P2.budget.sss,
    partner: P1.budget.partner + P2.budget.partner,
    section1: P1.budget.section1 + P2.budget.section1,
    section2: P1.budget.section2 + P2.budget.section2,
    section3: P1.budget.section3 + P2.budget.section3,
  };
}

function getActivities(){
  if(currentPhase==='phase1') return P1_ACTIVITIES;
  if(currentPhase==='phase2') return P2_ACTIVITIES;
  return ALL_ACTIVITIES;
}

function getProvinces(){
  if(currentPhase==='phase1') return P1.provinces;
  if(currentPhase==='phase2') return P2.provinces;
  return [...P1.provinces,...P2.provinces];
}

function getTWBI(){
  if(currentPhase==='phase1') return TWBI.filter(t=>t.phase===1);
  if(currentPhase==='phase2') return TWBI.filter(t=>t.phase===2);
  return TWBI;
}

function getPhaseLabel(){
  if(currentPhase==='phase1') return 'เฟส 1 (5 จังหวัดนำร่อง)';
  if(currentPhase==='phase2') return 'เฟส 2 (13 จังหวัด)';
  return 'ทั้งโครงการ (เฟส 1 + เฟส 2)';
}

// ===================== PHASE & TABS =====================

function setPhase(p){
  currentPhase=p;
  document.querySelectorAll('#phaseToggle button').forEach((b,i)=>{
    b.classList.toggle('active',['all','phase1','phase2'][i]===p);
  });
  Object.values(charts).forEach(c=>{if(c&&c.destroy)c.destroy()});
  charts={};
  render();
}

function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['overview','budget','indicators','twbi','provinces','activities'][i]===tab);
  });
  Object.values(charts).forEach(c=>{if(c&&c.destroy)c.destroy()});
  charts={};
  render();
}

function render(){
  const el=document.getElementById('mainContent');
  switch(currentTab){
    case 'overview': el.innerHTML=renderOverview(); initOverviewCharts(); break;
    case 'budget': el.innerHTML=renderBudget(); initBudgetCharts(); break;
    case 'indicators': el.innerHTML=renderIndicators(); break;
    case 'twbi': el.innerHTML=renderTWBI(); initTWBICharts(); break;
    case 'provinces': el.innerHTML=renderProvinces(); break;
    case 'activities': el.innerHTML=renderActivities(); break;
  }
}

  </div>
  <div class="flex gap-4 mb-4 flex-wrap">
    <div class="legend-item"><span class="status-dot" style="background:#10b981"></span>ดำเนินการแล้ว</div>
    <div class="legend-item"><span class="status-dot" style="background:#3b82f6"></span>กำลังดำเนินการ</div>
    <div class="legend-item"><span class="status-dot" style="background:#f59e0b"></span>วางแผน</div>
    <div class="legend-item"><span class="status-dot" style="background:#9ca3af"></span>ยังไม่เริ่ม</div>
  </div>
  ${strategies.map(s=>{
    const sActs=acts.filter(a=>a.strategy===s.n);
    if(!sActs.length) return '';
    const totalBudget=sActs.reduce((sum,a)=>sum+a.budget,0);
    return `<div class="card mb-6">
      <div class="flex items-center gap-3 mb-3">
        <span class="badge text-sm font-bold px-3 py-1" style="background:${s.color==='blue'?'#dbeafe':s.color==='emerald'?'#d1fae5':'#ede9fe'};color:${s.color==='blue'?'#1e40af':s.color==='emerald'?'#065f46':'#5b21b6'}">กลยุทธ์ ${s.n}</span>
        <div><h3 class="font-semibold text-sm">${s.name}</h3><p class="text-xs text-gray-400">งบรวม ${fmtM(totalBudget)} บาท (${sActs.length} กิจกรรม)</p></div>
      </div>
      <table><thead><tr><th>รหัส</th><th>กิจกรรม</th><th>ความถี่</th><th class="text-right">งบประมาณ</th><th>แหล่งทุน</th><th>เฟส</th><th>สถานะ</th></tr></thead>
      <tbody>
      ${sActs.map(a=>`<tr><td class="font-mono text-xs">${a.id}</td><td class="text-sm">${a.name}</td><td class="text-xs text-gray-500">${a.freq}</td><td class="text-right font-mono text-sm">${a.budget>0?fmt(a.budget):'-'}</td><td class="text-xs"><span class="badge ${a.source.includes('ภาคี')?'bg-amber-100 text-amber-800':'bg-blue-100 text-blue-800'}">${a.source}</span></td><td><span class="badge ${a.phase===1?'phase1':'phase2'}">${a.phase}</span></td><td><span class="badge ${statusBg(a.status)}" style="white-space:nowrap"><span class="status-dot" style="background:${statusColor(a.status)}"></span>${a.status}</span></td></tr>`).join('')}
      <tr class="font-bold bg-gray-50"><td colspan="3">รวมกลยุทธ์ ${s.n}</td><td class="text-right font-mono">${fmt(totalBudget)}</td><td colspan="3"></td></tr>
      </tbody></table>
    </div>`;
  }).join('')}
  <div class="card">
    <h3 class="font-semibold mb-3">สรุปสถานะกิจกรรมรวม</h3>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      ${['ดำเนินการแล้ว','กำลังดำเนินการ','วางแผน','ยังไม่เริ่ม'].map(s=>{
        const count=acts.filter(a=>a.status===s).length;
        const budget=acts.filter(a=>a.status===s).reduce((sum,a)=>sum+a.budget,0);
        return `<div class="border rounded-lg p-4 text-center"><div class="status-dot" style="background:${statusColor(s)};width:14px;height:14px;margin:0 auto 8px"></div><div class="text-2xl font-bold">${count}</div><div class="text-sm text-gray-500">${s}</div><div class="text-xs text-gray-400 mt-1">${fmtM(budget)} บาท</div></div>`;
      }).join('')}
    </div>
  </div>`;
}

// ===================== DRILLDOWN =====================

function openProvince(name){
  const d=PROVINCE_DETAIL[name];if(!d)return;
  const isP2=d.phase===2;
  document.getElementById('drilldownHeader').style.background=isP2?'linear-gradient(135deg,#16a34a,#15803d)':'linear-gradient(135deg,#2563eb,#1e40af)';
  document.getElementById('drilldownTitle').textContent=name;
  document.getElementById('drilldownSubtitle').textContent=d.zone+' | '+(isP2?'เฟส 2 — จังหวัดใหม่':'เฟส 1 — จังหวัดนำร่อง');
  const keys=['กลไก','MOU','ประเด็น','สื่อสาร'];
  const labels=['กลไกการทำงาน','ข้อตกลงความร่วมมือ','ประเด็นขับเคลื่อน','ช่องทางสื่อสาร'];
  const kpiHtml=keys.map((k,i)=>{
    const p=d.kpi[k];const c=p>=80?'#16a34a':p>=50?'#ea580c':p>0?'#dc2626':'#d1d5db';
    return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="color:#64748b">${labels[i]}</span><span style="font-weight:700;color:${c}">${p>0?p+'%':'—'}</span></div><div class="drilldown-kpi-bar-wrap"><div class="drilldown-kpi-bar-fill" style="width:${p}%;background:${c}"></div></div></div>`;
  }).join('');
  const issHtml=d.issues.map(x=>`<span class="drilldown-chip">${x}</span>`).join('');
  const hilHtml=(d.highlights||[]).map(x=>`<div class="drilldown-highlight">${x}</div>`).join('');
  const twbi=TWBI.find(t=>t.province===name);
  const twbiHtml=twbi&&twbi.overall?`<div class="drilldown-section"><div class="drilldown-section-title">TWBI Score</div><div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center"><div style="font-size:2rem;font-weight:800;color:#2563eb">${twbi.overall.toFixed(2)}</div><div style="font-size:.85rem;color:#64748b">อันดับ ${twbi.rank}/77</div></div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px;text-align:center;font-size:11px">${['สุขภาพ','ศก.-สังคม','สิ่งแวดล้อม','การศึกษา','มีส่วนร่วม'].map((dim,i)=>`<div><div style="color:${DIM_COLORS[i]};font-weight:700">${[twbi.health,twbi.socEcon,twbi.env,twbi.edu,twbi.civic][i].toFixed(1)}</div><div style="color:#94a3b8">${dim}</div></div>`).join('')}</div></div>`:'';
  document.getElementById('drilldownBody').innerHTML=`
    <div class="drilldown-section"><div class="drilldown-section-title">วิสัยทัศน์</div><div style="font-size:14px;font-style:italic;color:#1e293b;line-height:1.6">${d.vision}</div></div>
    <div class="drilldown-section"><div class="drilldown-section-title">ประเด็นขับเคลื่อน</div><div>${issHtml}</div></div>
    <div class="drilldown-section"><div class="drilldown-section-title">กลไกและกระบวนการหลัก</div><div style="font-size:13px;color:#1e293b;line-height:1.6">${d.mechanism}</div></div>
    <div class="drilldown-section"><div class="drilldown-section-title">ข้อตกลงความร่วมมือ (MOU)</div><div style="font-size:13px;color:#1e293b">${d.mou}</div></div>
    <div class="drilldown-section"><div class="drilldown-section-title">ผลสำเร็จเด่น</div>${hilHtml}</div>
    ${twbiHtml}
    <div class="drilldown-section"><div class="drilldown-section-title">ความก้าวหน้าตัวชี้วัด</div>${kpiHtml}</div>
    <div class="drilldown-section"><div class="drilldown-section-title">ความท้าทาย</div><div style="font-size:13px;color:#dc2626;line-height:1.6">${d.challenge}</div></div>
  `;
  openPanel();
}

function openAgency(idx){
  const d=AGENCIES[idx];if(!d)return;
  document.getElementById('drilldownHeader').style.background='linear-gradient(135deg,#7c3aed,#6d28d9)';
  document.getElementById('drilldownTitle').textContent=d.abbr;
  document.getElementById('drilldownSubtitle').textContent=d.full;
  const actHtml=(d.activities||[]).map(a=>`<div class="drilldown-highlight">${a}</div>`).join('');
  document.getElementById('drilldownBody').innerHTML=`
    <div class="drilldown-section"><div class="drilldown-section-title">บทบาทหลักในโครงการ</div><div style="font-size:13px;color:#1e293b;line-height:1.6">${d.role}</div></div>
    <div class="drilldown-section"><div class="drilldown-section-title">งบประมาณ / ทรัพยากรสมทบ</div><div style="font-size:13px;color:#1e293b">${d.budget||'ภาคีสมทบ'}</div></div>
    <div class="drilldown-section"><div class="drilldown-section-title">กิจกรรมสำคัญ</div>${actHtml}</div>
    <div class="drilldown-section"><div class="drilldown-section-title">การเป็นเจ้าภาพ / ความรับผิดชอบพิเศษ</div><div style="font-size:13px;color:#16a34a;font-weight:600">${d.hosting||'-'}</div></div>
    <div class="drilldown-section"><div class="drilldown-section-title">ผู้ประสานงาน</div><div style="font-size:13px;color:#1e293b">${d.contact||'-'}</div></div>
  `;
  openPanel();
}

function openPanel(){
  document.getElementById('drilldownOverlay').classList.add('open');
  document.getElementById('drilldownPanel').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeDrilldown(){
  document.getElementById('drilldownOverlay').classList.remove('open');
  document.getElementById('drilldownPanel').classList.remove('open');
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrilldown()});

// ===================== INIT =====================
document.getElementById('currentDate').textContent=new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
render();
</script>
</body>
</html>
