// ===================== HELPERS =====================

function fmt(n){if(n==null)return'-';return n.toLocaleString('th-TH')}
function fmtM(n){if(n>=1e6)return (n/1e6).toFixed(2)+' ล.';return fmt(n)}
function pct(a,b){return b?((a/b)*100).toFixed(1)+'%':'0%'}
function getMonthsElapsed(){
  const now=new Date();const diff=(now-PROJECT.startDate)/(1000*60*60*24*30.44);
  return Math.max(0,Math.min(PROJECT.duration,Math.floor(diff)));
}
function getCurrentInstallment(){
  const now=new Date();
  for(let i of BUDGET.installments){if(now>=i.startM&&now<=i.endM)return i.no}
  return 1;
}
function statusColor(s){
  return {'ดำเนินการแล้ว':'#10b981','กำลังดำเนินการ':'#3b82f6','วางแผน':'#f59e0b','ยังไม่เริ่ม':'#9ca3af'}[s]||'#9ca3af';
}
function statusBg(s){
  return {'ดำเนินการแล้ว':'bg-green-100 text-green-800','กำลังดำเนินการ':'bg-blue-100 text-blue-800','วางแผน':'bg-yellow-100 text-yellow-800','ยังไม่เริ่ม':'bg-gray-100 text-gray-500'}[s]||'bg-gray-100 text-gray-500';
}

// ===================== TABS =====================

let currentTab='overview';
let charts={};

function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['overview','budget','indicators','twbi','provinces','activities'][i]===tab);
  });
  Object.values(charts).forEach(c=>{if(c&&c.destroy)c.destroy()});
  charts={};
  render();
}

function render(){
  const el=document.getElementById('mainContent');
  switch(currentTab){
    case 'overview': el.innerHTML=renderOverview(); initOverviewCharts(); break;
    case 'budget': el.innerHTML=renderBudget(); initBudgetCharts(); break;
    case 'indicators': el.innerHTML=renderIndicators(); break;
    case 'twbi': el.innerHTML=renderTWBI(); initTWBICharts(); break;
    case 'provinces': el.innerHTML=renderProvinces(); break;
    case 'activities': el.innerHTML=renderActivities(); break;
  }
}

  </div>
  <div class="card">
    <h3 class="font-semibold mb-1">TWBI Transformation Playbook (Theory of Change)</h3>
    <p class="text-xs text-gray-400 mb-3">กระบวนการเปลี่ยนแปลงจากข้อมูลสู่การลงมือทำ</p>
    <div class="flex flex-wrap gap-2 justify-center">
      ${['Data\nข้อมูล','Pattern\nแบบแผน','Dialogue\nเสวนา','Area Agenda\nวาระพื้นที่','Collective Action\nปฏิบัติการร่วม','Learning Review\nทบทวนเรียนรู้'].map((s,i)=>`<div class="flex items-center gap-2"><div class="rounded-lg px-4 py-3 text-center text-sm font-semibold" style="min-width:100px;background:hsl(${220-i*15},70%,${92-i*8}%);color:hsl(${220-i*15},70%,${30+i*5}%)">${s.replace('\n','<br>')}</div>${i<5?'<span class="text-gray-300 text-xl">&rarr;</span>':''}</div>`).join('')}

function initTWBICharts(){
  const available=TWBI.filter(t=>t.overall!==null).sort((a,b)=>b.overall-a.overall);
  charts.twbiBar=new Chart(document.getElementById('chartTWBIBar'),{type:'bar',data:{labels:available.map(t=>t.province),datasets:[
    {label:'สุขภาพ',data:available.map(t=>t.health),backgroundColor:DIM_COLORS[0]+'cc'},
    {label:'เศรษฐกิจ-สังคม',data:available.map(t=>t.socEcon),backgroundColor:DIM_COLORS[1]+'cc'},
    {label:'สิ่งแวดล้อม',data:available.map(t=>t.env),backgroundColor:DIM_COLORS[2]+'cc'},
    {label:'การศึกษา',data:available.map(t=>t.edu),backgroundColor:DIM_COLORS[3]+'cc'},
    {label:'การมีส่วนร่วม',data:available.map(t=>t.civic),backgroundColor:DIM_COLORS[4]+'cc'},
  ]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}},scales:{y:{max:100,title:{display:true,text:'คะแนน'}},x:{ticks:{font:{size:10}}}}}});
  const top4=available.slice(0,4);const radarColors=['#3b82f6','#ef4444','#10b981','#f59e0b'];
  charts.twbiRadar=new Chart(document.getElementById('chartTWBIRadar'),{type:'radar',data:{labels:TWBI_DIMS,datasets:top4.map((t,i)=>({label:t.province+' ('+t.overall.toFixed(1)+')',data:[t.health,t.socEcon,t.env,t.edu,t.civic],borderColor:radarColors[i],backgroundColor:radarColors[i]+'22',borderWidth:2,pointRadius:3}))},options:{responsive:true,scales:{r:{min:0,max:100,ticks:{stepSize:20}}},plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}}}});
}

  </div>
  <div class="card mb-6">
    <h3 class="font-semibold mb-1">จังหวัดเป้าหมาย ระยะที่ 2 (8 จังหวัด)</h3>
    <p class="text-xs text-gray-400 mb-3">จังหวัดใหม่ที่คัดเลือกจากเขตสุขภาพที่ยังไม่เคยเข้าร่วม — ครอบคลุมทุกเขตสุขภาพทั่วประเทศ</p>
    <table><thead><tr><th>จังหวัด</th><th>เฟส</th><th>เขตสุขภาพ</th><th>TWBI</th><th>อันดับ</th><th>สถานะ</th></tr></thead>

  </div>
  <div class="card mb-6">
    <h3 class="font-semibold mb-3">งบสนับสนุนระดับจังหวัด (เฟส 2 — 8 จังหวัดใหม่)</h3>
    <p class="text-xs text-gray-400 mb-3">จากเอกสารข้อเสนอโครงการที่เสนอ สสส.</p>
    <table><thead><tr><th>รายการ</th><th class="text-right">ต่อจังหวัด</th><th class="text-right">รวม 8 จว.</th></tr></thead>
      <tbody>
        <tr><td>สนับสนุนทีมประสานจังหวัด (1.2.1)</td><td class="text-right font-mono">100,000</td><td class="text-right font-mono">800,000</td></tr>
        <tr><td>พัฒนาวาระเป้าหมายร่วม แผนขับเคลื่อน ข้อตกลงร่วม (1.2.2)</td><td class="text-right font-mono">400,000</td><td class="text-right font-mono">3,200,000</td></tr>
        <tr><td>ขับเคลื่อนกลไกตำบล/ชุมชนเป้าหมาย (1.2.3)</td><td class="text-right font-mono">400,000</td><td class="text-right font-mono">3,200,000</td></tr>
        <tr><td>สื่อสารและสร้างการรับรู้ (1.2.4)</td><td class="text-right font-mono">200,000</td><td class="text-right font-mono">1,600,000</td></tr>
        <tr><td>ถอดบทเรียน (1.2.5)</td><td class="text-right font-mono">200,000</td><td class="text-right font-mono">1,600,000</td></tr>
        <tr class="font-bold bg-gray-50"><td>รวมต่อจังหวัด</td><td class="text-right font-mono">1,300,000</td><td class="text-right font-mono">10,400,000</td></tr>
      </tbody></table>
  </div>
  <div class="card">

    <div class="grid md:grid-cols-3 gap-3">
    ${[
      {abbr:'สสส.',full:'สำนักงานกองทุนสนับสนุนการสร้างเสริมสุขภาพ',role:'Seed funding, นวัตกรรม, สื่อสารสาธารณะ'},
      {abbr:'สช.',full:'สำนักงานคณะกรรมการสุขภาพแห่งชาติ',role:'สมัชชาสุขภาพ, ธรรมนูญ, กระบวนการมีส่วนร่วม'},

      {abbr:'พอช.',full:'สถาบันพัฒนาองค์กรชุมชน (องค์การมหาชน)',role:'กองทุนสวัสดิการชุมชน, เครือข่ายองค์กรชุมชน'},
      {abbr:'สวรส.',full:'สถาบันวิจัยระบบสาธารณสุข',role:'ทุนวิจัย, ประเมินเชิงพัฒนา (DE), ระบบวิชาการ'},
      {abbr:'นิด้า',full:'สถาบันบัณฑิตพัฒนบริหารศาสตร์',role:'Data analytics, Policy design, Executive learning'},
      {abbr:'บพท.',full:'หน่วยบริหารและจัดการทุนด้านการพัฒนาระดับพื้นที่',role:'ทุนพัฒนาพื้นที่/นวัตกรรม, Policy lab'},

      {abbr:'สรพ.',full:'สถาบันรับรองคุณภาพสถานพยาบาล',role:'มาตรฐานคุณภาพ, ระบบรับรอง'},

// ===================== ACTIVITIES =====================

function renderActivities(){
  const strategies = [{n:1,name:'สร้างระบบนิเวศความร่วมมือและกลไกขับเคลื่อนหลายระดับ',color:'blue'},{n:2,name:'ขับเคลื่อนวาระเป้าหมายร่วมในพื้นที่อย่างมุ่งเป้า',color:'emerald'},{n:3,name:'พัฒนาระบบข้อมูล บูรณาการทรัพยากร สื่อสารสาธารณะ',color:'purple'}];

  return `
  <div class="flex gap-4 mb-4 flex-wrap">
    <div class="legend-item"><span class="status-dot" style="background:#10b981"></span>ดำเนินการแล้ว</div>
    <div class="legend-item"><span class="status-dot" style="background:#3b82f6"></span>กำลังดำเนินการ</div>
    <div class="legend-item"><span class="status-dot" style="background:#f59e0b"></span>วางแผน</div>
    <div class="legend-item"><span class="status-dot" style="background:#9ca3af"></span>ยังไม่เริ่ม</div>
  </div>
  <div class="grid md:grid-cols-2 gap-4 mb-6">
    <div class="card">
      <h3 class="font-semibold mb-3">กิจกรรมส่วนกลาง (${ACTIVITIES.filter(a=>a.level==='กลาง').length} กิจกรรม)</h3>
      <div class="scroll-table"><table><thead><tr><th>รหัส</th><th>กิจกรรม</th><th>สถานะ</th></tr></thead><tbody>
      ${ACTIVITIES.filter(a=>a.level==='กลาง').map(a=>`<tr><td class="font-mono text-xs">${a.id}</td><td class="text-sm">${a.name}</td><td><span class="badge ${statusBg(a.status)}">${a.status}</span></td></tr>`).join('')}
      </tbody></table></div>
    </div>
    <div class="card">
      <h3 class="font-semibold mb-3">กิจกรรมระดับจังหวัด (${ACTIVITIES.filter(a=>a.level==='จังหวัด').length} กิจกรรม)</h3>
      <div class="scroll-table"><table><thead><tr><th>รหัส</th><th>กิจกรรม</th><th>สถานะ</th></tr></thead><tbody>
      ${ACTIVITIES.filter(a=>a.level==='จังหวัด').map(a=>`<tr><td class="font-mono text-xs">${a.id}</td><td class="text-sm">${a.name}</td><td><span class="badge ${statusBg(a.status)}">${a.status}</span></td></tr>`).join('')}
      </tbody></table></div>
    </div>
  </div>
  ${strategies.map(s=>{
    const acts=ACTIVITIES.filter(a=>a.strategy===s.n);
    const totalBudget=acts.reduce((sum,a)=>sum+a.budget,0);
    return `<div class="card mb-6">
      <div class="flex items-center gap-3 mb-3">
        <span class="badge text-sm font-bold px-3 py-1" style="background:${s.color==='blue'?'#dbeafe':s.color==='emerald'?'#d1fae5':'#ede9fe'};color:${s.color==='blue'?'#1e40af':s.color==='emerald'?'#065f46':'#5b21b6'}">กลยุทธ์ ${s.n}</span>
        <div><h3 class="font-semibold text-sm">${s.name}</h3><p class="text-xs text-gray-400">งบรวม ${fmtM(totalBudget)} บาท (${acts.length} กิจกรรม)</p></div>
      </div>
      <table><thead><tr><th>รหัส</th><th>กิจกรรม</th><th>ความถี่</th><th class="text-right">งบประมาณ</th><th>แหล่งทุน</th><th>ระดับ</th><th>งวด</th><th>สถานะ</th></tr></thead>
      <tbody>
      ${acts.map(a=>`<tr><td class="font-mono text-xs">${a.id}</td><td class="text-sm">${a.name}</td><td class="text-xs text-gray-500">${a.freq}</td><td class="text-right font-mono text-sm">${a.budget>0?fmt(a.budget):'-'}</td><td class="text-xs"><span class="badge ${a.source.includes('ภาคี')?'bg-amber-100 text-amber-800':'bg-blue-100 text-blue-800'}">${a.source}</span></td><td class="text-xs">${a.level==='กลาง'?'<span class="badge bg-indigo-100 text-indigo-700">ส่วนกลาง</span>':'<span class="badge bg-teal-100 text-teal-700">จังหวัด</span>'}</td><td class="text-center text-xs">${a.installment}</td><td><span class="badge ${statusBg(a.status)}" style="white-space:nowrap"><span class="status-dot" style="background:${statusColor(a.status)}"></span>${a.status}</span></td></tr>`).join('')}
      <tr class="font-bold bg-gray-50"><td colspan="3">รวมกลยุทธ์ ${s.n}</td><td class="text-right font-mono">${fmt(totalBudget)}</td><td colspan="4"></td></tr>
      </tbody></table>
    </div>`;
  }).join('')}
  <div class="card">
    <h3 class="font-semibold mb-3">สรุปสถานะกิจกรรมรวม</h3>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      ${['ดำเนินการแล้ว','กำลังดำเนินการ','วางแผน','ยังไม่เริ่ม'].map(s=>{
        const count=ACTIVITIES.filter(a=>a.status===s).length;
        const budget=ACTIVITIES.filter(a=>a.status===s).reduce((sum,a)=>sum+a.budget,0);
        return `<div class="border rounded-lg p-4 text-center"><div class="status-dot" style="background:${statusColor(s)};width:14px;height:14px;margin:0 auto 8px"></div><div class="text-2xl font-bold">${count}</div><div class="text-sm text-gray-500">${s}</div><div class="text-xs text-gray-400 mt-1">${fmtM(budget)} บาท</div></div>`;
      }).join('')}
    </div>
  </div>`;
}

render();
